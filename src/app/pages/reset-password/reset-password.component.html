<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>AYUSUTRA</h1>
      <p>Create a new password</p>
    </div>
    <p *ngIf="identifier"><strong>Account:</strong> {{ identifier }} ({{ role }})</p>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="otp">6-Digit OTP</label>
        <input
          type="text"
          id="otp"
          formControlName="otp"
          maxlength="6"
          placeholder="Enter OTP"
          [class.error]="otp?.invalid && otp?.touched"
        >
        <div class="error-message" *ngIf="otp?.invalid && otp?.touched">
          <span *ngIf="otp?.errors?.['required']">OTP is required</span>
          <span *ngIf="otp?.errors?.['pattern']">Please enter a valid 6-digit OTP</span>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input 
          type="password" 
          id="newPassword" 
          formControlName="newPassword" 
          placeholder="Min 8 chars, include upper/lower/number"
          [class.error]="newPassword?.invalid && newPassword?.touched"
        >
        <div class="error-message" *ngIf="newPassword?.invalid && newPassword?.touched">
          <span *ngIf="newPassword?.errors?.['required']">New password is required</span>
          <span *ngIf="newPassword?.errors?.['minlength']">Password must be at least 8 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          placeholder="Confirm your new password"
          [class.error]="(confirmPassword!.invalid || resetForm.errors?.['passwordMismatch']) && confirmPassword!.touched"
        >
        <div class="error-message" *ngIf="confirmPassword!.touched">
          <span *ngIf="confirmPassword!.errors?.['required']">Please confirm your password</span>
          <span *ngIf="resetForm.errors?.['passwordMismatch']">Passwords do not match</span>
        </div>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message global-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="btn-primary" 
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">Reset Password</span>
        <span *ngIf="isLoading">Saving...</span>
      </button>
    </form>

    <div class="auth-footer">
      <button type="button" class="btn-link" (click)="navigateToLogin()">
        ← Back to Login
      </button>
    </div>
  </div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>AYUSUTRA</h1>
      <p>Forgot your password? No worries!</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit('patient')" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="Enter your registered email"
          [class.error]="email?.invalid && email?.touched"
        >
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="info-text">
        <p>We'll send a 6-digit OTP to your registered email to verify your identity.</p>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message global-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="button" class="btn-primary" [disabled]="isLoading" (click)="onSubmit('patient')">
        <span *ngIf="!isLoading">Send OTP as Patient</span>
        <span *ngIf="isLoading && selectedRole === 'patient'">Sending...</span>
        <span *ngIf="isLoading && selectedRole !== 'patient'">Please wait...</span>
      </button>

      <button type="button" class="btn-primary" [disabled]="isLoading" (click)="onSubmit('doctor')">
        <span *ngIf="!isLoading">Send OTP as Doctor</span>
        <span *ngIf="isLoading && selectedRole === 'doctor'">Sending...</span>
        <span *ngIf="isLoading && selectedRole !== 'doctor'">Please wait...</span>
      </button>
    </form>

    <div class="auth-footer">
      <button type="button" class="btn-link" (click)="navigateToLogin()">
        ← Back to Login
      </button>
    </div>
  </div>
</div>

version: '3.8'

services:
  ayusutra:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CONSULT_PORT=4000
    volumes:
      - ayusutra-data:/app/server
      - ayusutra-uploads:/app/server/secure_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ayusutra-data:
    driver: local
  ayusutra-uploads:
    driver: local
